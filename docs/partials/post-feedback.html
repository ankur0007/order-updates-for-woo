<style>
.postfeedback { max-width: 820px; margin: 48px auto 0; padding: 0 24px; }
.postfeedback__box { border: 1px solid #e5e7eb; border-radius: 16px; padding: 26px 28px; background: #f8fafc; }

.postfeedback__links { display: flex; flex-wrap: wrap; gap: 12px; }

		<div class="postfeedback__links">
			<a class="pf-forum" href="https://wordpress.org/support/plugin/order-updates-for-woo/" target="_blank" rel="noopener">WordPress.org support &rarr;</a>
